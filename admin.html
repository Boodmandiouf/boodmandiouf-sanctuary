    function unlockVault() {
        const inputKey = document.getElementById('vault-key').value;
        const errorBox = document.getElementById('error-box');
        const slot = document.getElementById('admin-vault-slot');
        const authScreen = document.getElementById('auth-screen');

        if (!inputKey) {
            errorBox.style.display = 'block';
            errorBox.innerText = "⚠️ MERCI DE SAISIR UNE CLÉ";
            return;
        }

        try {
            // Déchiffrement à la volée avec CryptoJS
            const decryptedBytes = CryptoJS.AES.decrypt(ENCRYPTED_ADMIN_DATA, inputKey);
            const decryptedHtml = decryptedBytes.toString(CryptoJS.enc.Utf8);

            // Si le décodage échoue ou renvoie du contenu invalide
            if (!decryptedHtml || !decryptedHtml.trim().startsWith("<section")) {
                throw new Error("Clé invalide");
            }

            errorBox.style.display = 'none';
            
            // 1. Masquage propre du portail d'accès
            if (authScreen) {
                authScreen.style.setProperty('display', 'none', 'important');
            }
            
            // 2. Injection sécurisée du HTML déchiffré
            slot.innerHTML = decryptedHtml;
            
            // 3. Rendre l'admin visible à l'écran
            slot.style.setProperty('display', 'block', 'important');
            slot.style.setProperty('opacity', '1', 'important');
            slot.style.setProperty('visibility', 'visible', 'important');

            const adminSection = slot.querySelector('#admin');
            if (adminSection) {
                adminSection.style.setProperty('display', 'block', 'important');
                adminSection.style.setProperty('opacity', '1', 'important');
                adminSection.style.setProperty('visibility', 'visible', 'important');
            }

            // 4. Lancement des scripts d'animation d'origine
            if (typeof loadAdminScripts === 'function') {
                setTimeout(loadAdminScripts, 50);
            }

        } catch (err) {
            errorBox.style.display = 'block';
            errorBox.innerText = "⚠️ ACCESS DENIED // DECRYPTION FAILURE // KEY INVALIDE";
            console.warn("Système : Échec de l'authentification.");
        }
    }
