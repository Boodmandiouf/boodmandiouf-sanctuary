<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoodmanDiouf | Central Core Override</title>
    <link rel="icon" type="image/png" href="img/logo_admin.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

    <template id="raw-admin-template">
        <section id="admin" class="page-section">
            <h2 class="section-title">CENTRAL CORE OVERRIDE</h2>
            <div class="admin-terminal">
                <div class="terminal-header">
                    <div class="terminal-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                    <div class="terminal-title-text">ST3MON // CENTRAL_CORE_v2.4.0</div>
                    <div class="terminal-status"><i class="fas fa-lock"></i> SECURE_SESSION</div>
                </div>
                <div class="admin-grid">
                    <div class="panel-box">
                        <h3 class="panel-title"><span><i class="fas fa-server"></i> HOST_STATUS</span> <span class="status-online">ONLINE</span></h3>
                        <div class="panel-content">
                            <p><span class="label">TARGET_URL:</span> boodmandiouf.github.io</p>
                            <p><span class="label">SERVER_GATE:</span> GitHub Pages Proxy</p><p><span class="label">SSL_HANDSHAKE:</span> ACTIVE (TLSv1.3)</p>
                            <p><span class="label">ENVIRONMENT:</span> PRODUCTION_ENV</p>
                            <p><span class="label">VAULT_VISITS:</span> <span id="visit-count" style="color: #ffffff; font-weight: bold;">CHARGEMENT...</span></p>
                        </div>
                    </div>
                    <div class="panel-box">
                        <h3 class="panel-title"><span><i class="fas fa-edit"></i> WORKFLOW_LOGBOOK</span> <span style="color: #df162b; font-size: 0.75rem;">AUTO_SAVE</span></h3>
                        <div class="panel-content" style="height: calc(100% - 30px); display: flex; flex-direction: column;">
                            <textarea id="admin-notes" class="terminal-textarea" placeholder="[Saisir vos directives, ID de tracks ou mémos système...]"></textarea>
                        </div>
                    </div>
                    <div class="panel-box">
                        <h3 class="panel-title"><span><i class="fas fa-sliders-h"></i> CORE_OVERRIDES</span></h3>
                        <div class="panel-content actions-flex">
                            <button class="console-btn" onclick="triggerAction('PURGE_CACHE')">FLUSH CACHE</button>
                            <button class="console-btn btn-danger" onclick="triggerAction('EMERGENCY_LOCK')">LOCKDOWN</button>
                            <button class="console-btn" style="border-color: #ffb300; color: #ffb300;" onclick="clearNotes()">CLEAR LOGBOOK</button>
                        </div>
                    </div>
                </div>
                <div class="panel-box matrix-graph-section" style="margin: 0 20px 20px 20px;">
                    <h3 class="panel-title"><span><i class="fas fa-wave-square"></i> NETWORK_FLOW_MONITORING</span> <span id="fps-counter" style="color: #00ff66; font-size: 0.75rem;">GRID: ACTIVE</span></h3>
                    <div class="canvas-container"><canvas id="networkCanvas"></canvas></div>
                </div>
                <div class="panel-box terminal-logs-section" style="margin: 0 20px 20px 20px;">
                    <h3 class="panel-title"><span><i class="fas fa-terminal"></i> LIVE_KERNEL_LOGS</span></h3>
                    <div class="log-feed" id="logFeed"></div>
                </div>
            </div>
        </section>
    </template>

    <div id="auth-screen" class="vault-auth-container">
        <div class="crypto-modal">
            <h3><i class="fas fa-terminal"></i> CENTRAL CORE OVERRIDE</h3>
            <div class="crypto-input-wrapper">
                <i class="fas fa-key"></i>
                <input type="password" id="vault-key" class="crypto-input" placeholder="ENTER ACCESS KEY" onkeydown="if(event.key === 'Enter') unlockVault()">
            </div>
            <button class="btn-decrypt" onclick="unlockVault()">
                INITIALIZE OVERRIDE <span>➔]</span>
            </button>
            <div id="error-box" class="error-msg">⚠️ ACCESS DENIED // KEY CORRUPTED</div>
        </div>
    </div>

<div id="admin-vault-slot" style="display: block !important; visibility: visible !important; opacity: 1 !important; background: #0a0a0c !important; color: #ffffff !important; min-height: 100vh; padding: 20px;"></div>
    <script>
    const SECRET_PASSPHRASE = "2JsFgyosx0mq9Fzrte2a8UMXML2Y5e3y";

    function unlockVault() {
        const inputKey = document.getElementById('vault-key').value;
        const errorBox = document.getElementById('error-box');

        if (inputKey === SECRET_PASSPHRASE) {
            errorBox.style.display = 'none';
            
            const template = document.getElementById('raw-admin-template');
            const slot = document.getElementById('admin-vault-slot');
            
            if (!template) {
                console.error("ERREUR : Template introuvable !");
                return;
            }

            // 1. Masquer le login
            document.getElementById('auth-screen').style.display = 'none';
            
            // 2. Injecter le contenu
            slot.innerHTML = template.innerHTML;
            
            // 3. FORCE l'affichage visuel (anti-page blanche)
            slot.style.setProperty('display', 'block', 'important');
            slot.style.setProperty('opacity', '1', 'important');
            slot.style.setProperty('visibility', 'visible', 'important');

            // Force aussi la section admin elle-même à être visible au cas où le CSS l'efface
            const adminSection = slot.querySelector('#admin');
            if (adminSection) {
                adminSection.style.setProperty('opacity', '1', 'important');
                adminSection.style.setProperty('display', 'block', 'important');
            }

            // 4. Lancer les scripts d'animation (canvas, logs...)
            setTimeout(loadAdminScripts, 50);
        } else {
            errorBox.style.display = 'block';
        }
    }

    function loadAdminScripts() {
        const script = document.createElement('script');
        script.src = 'js/admin.js?v=' + Date.now();
        script.defer = true;
        document.body.appendChild(script);
    }
</script>
</body>
</html>
